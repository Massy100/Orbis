version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: orbis_db
    restart: always
    environment:
      POSTGRES_DB: new_new_orbis_db 
      POSTGRES_USER: orbis_user
      POSTGRES_PASSWORD: orbis_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbis_user -d new_new_orbis_db"]  
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orbis_network

  # Django Backend
  backend:
    build: ./backend
    container_name: orbis_backend
    restart: always
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      DJANGO_SETTINGS_MODULE: orbis_core.settings
      DB_NAME: new_new_orbis_db
      DB_USER: orbis_user
      DB_PASSWORD: orbis_password
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - orbis_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile  
    container_name: orbis_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:8000/api
      WATCHPACK_POLLING: true 
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - orbis_network

  # Adminer (Database UI)
  adminer:
    image: adminer
    container_name: orbis_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - orbis_network

networks:
  orbis_network:
    driver: bridge

volumes:
  postgres_data: